# Deploys the Breakwater site (breakwater/site/) to GitHub Pages.
#
# ONE-TIME ENABLE (repo owner): Settings -> Pages -> Build and deployment ->
#   Source: "GitHub Actions". If the deploy step reports the branch isn't
#   allowed, go to Settings -> Environments -> github-pages -> Deployment
#   branches and add this branch (or set "All branches"), then re-run.
#
# After enabling, trigger from the Actions tab ("Run workflow") or push a
# change under breakwater/site/. Live URL: https://rr634.github.io/claude/
name: Deploy site to GitHub Pages

on:
  push:
    branches: [ "main", "claude/breakwater-capital-strategy-pdprql" ]
    paths:
      - "breakwater/site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: breakwater/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
